<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge 1: Fraction Animation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }

    #container {
      display: flex;
      align-items: center;
      position: relative;
    }

    #question {
      display: inline-block;
      margin-right: 10px;
      transition: transform 0.6s ease-in-out;
    }

    #question:hover {
      transform: scale(0.9);
    }

    #equals {
      margin-right: 10px;
    }

    #answer {
      display: inline-block;
      animation-name: moveFraction;
      animation-duration: 2s;
      animation-delay: 1s;
      animation-fill-mode: forwards;
      /* start off-screen so it's invisible before animation kicks in */
      transform: translate(-355px, 60px);
      color: yellow;
    }

    @keyframes moveFraction {
      0% {
        color: yellow;
        transform: translate(-355px, 60px);
      }
      50% {
        transform: translate(0px, 60px);
      }
      100% {
        color: red;
        transform: translate(0px, 0px);
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <span id="question">1/4 + 2/4</span>
    <span id="equals">=</span>
    <span id="answer">3/4</span>
  </div>
</body>
</html>

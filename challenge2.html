<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge 2: I ♥ NY T-Shirt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #f5d97e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Rainbow gradient border card */
    .card {
      background: linear-gradient(135deg, #ff9de2, #a78bfa, #60c8f5, #7de8a0);
      border-radius: 22px;
      padding: 4px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    }

    .card-inner {
      background: #fff;
      border-radius: 19px;
      padding: 32px 44px 40px;
      text-align: center;
    }

    /* ── Positioned ancestor — absolute children anchor here ── */
    .shirt-wrap {
      position: relative;
      display: inline-block;
    }

    img {
      position: relative;
      left: 10px;        /* 10px further right than default */
      display: block;
      width: 300px;

      /* Frame */
      border: 3px solid #111;
      padding: 10px;
      margin: 0 auto;

      /* Box shadow */
      box-shadow: 6px 8px 22px rgba(0,0,0,0.28);
      border-radius: 6px;
    }

    .words {
      font-family: impact, 'Arial Narrow', sans-serif;
      font-size: 62px;
      color: #111;
    }

    .first {
      position: absolute;
      top:  88px;
      left: 118px;
      z-index: 10;
    }

    .heart {
      color: red;
      font-size: 78px;
      position: absolute;
      top:  76px;
      left: 166px;
      z-index: 10;
    }

    .last {
      font-family: impact, 'Arial Narrow', sans-serif;
      font-size: 62px;
      color: #111;
      position: absolute;
      top: 152px;
      left: 122px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-inner">
      <div class="shirt-wrap">
        <span class="first words">I</span>
        <span class="heart">&hearts;</span>
        <span class="last words">NY</span>

        <img
          src="https://pngimg.com/uploads/tshirt/tshirt_PNG5435.png"
          alt="White t-shirt"
        >
      </div>
    </div>
  </div>

</body>
</html>
